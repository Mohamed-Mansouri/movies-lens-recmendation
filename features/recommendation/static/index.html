<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Recommender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; color: #fff; }
    h1 span { color: #7c6af7; }

    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 36px; }

    /* ── Layout: content + side panel ── */
    .layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
      justify-content: center;
    }

    .main-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    /* ── Control card ── */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 14px;
      padding: 28px 32px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .model-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .model-label-row label { margin-bottom: 0; }

    .info-toggle {
      font-size: 0.75rem;
      color: #7c6af7;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
      padding: 2px 8px;
      border: 1px solid #7c6af7;
      border-radius: 99px;
      transition: background 0.2s;
    }
    .info-toggle:hover { background: #7c6af722; }
    .info-toggle .arrow { transition: transform 0.3s; font-style: normal; }
    .info-toggle.open .arrow { transform: rotate(180deg); }

    input[type="number"], select {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus, select:focus { border-color: #7c6af7; }

    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }

    button {
      width: 100%;
      padding: 12px;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover  { background: #6a58e0; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #444; cursor: not-allowed; }

    #error { color: #f87171; font-size: 0.875rem; margin-top: 12px; display: none; }

    #results { width: 100%; max-width: 800px; }

    .model-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }
    .badge-svd     { background: #1e3a5f; color: #60a5fa; }
    .badge-knn     { background: #1a3a2a; color: #4ade80; }
    .badge-xgboost { background: #2e1f3e; color: #c084fc; }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .movie-card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .movie-card:hover { border-color: #7c6af7; transform: translateY(-2px); }

    .movie-rank  { font-size: 0.7rem; color: #666; margin-bottom: 6px; }
    .movie-title { font-weight: 600; font-size: 0.95rem; color: #fff; margin-bottom: 8px; line-height: 1.3; }
    .movie-genres { font-size: 0.75rem; color: #888; margin-bottom: 10px; }

    .star-bar  { height: 4px; background: #2a2a45; border-radius: 2px; overflow: hidden; }
    .star-fill { height: 100%; background: linear-gradient(90deg, #7c6af7, #c084fc); border-radius: 2px; transition: width 0.5s ease; }

    .rating-label { font-size: 0.75rem; color: #aaa; margin-top: 5px; }
    .rating-label span { color: #c084fc; font-weight: 700; }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid #333;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Side panel ── */
    .side-panel {
      width: 320px;
      flex-shrink: 0;
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 14px;
      overflow: hidden;
      transition: width 0.35s ease, opacity 0.3s ease, border-color 0.2s;
      position: sticky;
      top: 40px;
    }
    .side-panel.collapsed {
      width: 0;
      opacity: 0;
      border-color: transparent;
      pointer-events: none;
    }

    .panel-inner { padding: 22px 20px; min-width: 320px; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }

    .panel-close {
      cursor: pointer;
      color: #555;
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.2s;
    }
    .panel-close:hover { color: #e0e0e0; }

    .panel-model-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .pipeline-step {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #7c6af722;
      border: 1px solid #7c6af7;
      color: #7c6af7;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-body { flex: 1; }
    .step-title { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .step-desc  { font-size: 0.78rem; color: #999; line-height: 1.5; }

    .step-desc code {
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.75rem;
      color: #c084fc;
    }

    .features-box {
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 6px;
    }
    .features-box .feat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 8px;
    }
    .feat-tag {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.72rem;
      color: #aaa;
      margin: 2px 3px 2px 0;
    }

    .divider {
      height: 1px;
      background: #2a2a45;
      margin: 16px 0;
    }

    @media (max-width: 860px) {
      .layout { flex-direction: column; align-items: center; }
      .side-panel { width: 100%; max-width: 560px; position: static; }
      .side-panel.collapsed { width: 100%; max-height: 0; opacity: 0; padding: 0; }
    }
  </style>
</head>
<body>

  <h1>🎬 Movie <span>Recommender</span></h1>
  <p class="subtitle">MovieLens · SVD · KNN · XGBoost</p>

  <div class="layout">

    <!-- Main column -->
    <div class="main-col">
      <div class="card">
        <div class="row">
          <div>
            <label for="userId">User ID</label>
            <input type="number" id="userId" min="1" placeholder="e.g. 42" />
          </div>
          <div>
            <label for="topN">Top N</label>
            <input type="number" id="topN" min="1" max="50" value="10" />
          </div>
        </div>

        <div class="model-label-row">
          <label for="model">Model</label>
          <span class="info-toggle" id="infoToggle" onclick="togglePanel()">
            How it works <i class="arrow">▾</i>
          </span>
        </div>
        <select id="model" onchange="onModelChange()">
          <option value="svd">SVD — Matrix Factorization</option>
          <option value="knn">KNN — User-based Collaborative</option>
          <option value="xgboost" selected>XGBoost — Gradient Boosting</option>
        </select>

        <button id="btn" onclick="recommend()">Get Recommendations</button>
        <div id="error"></div>
      </div>

      <div id="results"></div>
    </div>

    <!-- Side panel -->
    <div class="side-panel collapsed" id="sidePanel">
      <div class="panel-inner">
        <div class="panel-header">
          <span class="panel-title">Pipeline</span>
          <span class="panel-close" onclick="togglePanel()">✕</span>
        </div>
        <div id="panelContent"></div>
      </div>
    </div>

  </div><!-- /.layout -->

  <script>
    // ── Pipeline content per model ──────────────────────────────────────────
    const PIPELINES = {
      svd: {
        name: 'SVD — Matrix Factorization',
        steps: [
          {
            title: 'Build user-item matrix',
            desc: 'All training ratings are pivoted into a <code>(6,040 × 3,952)</code> matrix. Missing entries are filled with <code>0</code>.'
          },
          {
            title: 'Mean-centre rows',
            desc: "Each user's observed ratings have their personal average subtracted. This removes rating-scale bias so a user who always rates 4/5 doesn't dominate the decomposition."
          },
          {
            title: 'Truncated SVD decomposition',
            desc: 'The centred matrix is decomposed into <code>U_sigma (6040×100)</code> and <code>Vt (100×3952)</code> — 100 latent factors capturing hidden taste dimensions.'
          },
          {
            title: 'Reconstruct predictions',
            desc: '<code>predicted = U_sigma · Vt + user_means</code>. The mean is added back to restore the original rating scale. Clipped to <code>[0.5, 5.0]</code>.',
            features: ['Full user-item matrix (6,040 × 3,952)']
          },
          {
            title: 'Top-N recommendation',
            desc: 'For the target user, rank all unrated movies by predicted rating and return the top N.'
          }
        ]
      },
      knn: {
        name: 'KNN — User-based Collaborative',
        steps: [
          {
            title: 'Build user-item matrix',
            desc: 'Same <code>(6,040 × 3,952)</code> matrix as SVD. Each row is a user\'s rating vector — zeros where no rating exists.'
          },
          {
            title: 'Pre-compute cosine similarity',
            desc: 'For every user, the 40 most similar users are found using cosine distance on their rating vectors. Distances and indices are cached so no recomputation happens at request time.'
          },
          {
            title: 'Mean-centred weighted prediction',
            desc: 'For a target (user, movie) pair, filter neighbours who rated that movie, then:<br><code>pred = μ_u + Σ(sim_k × (r_k − μ_k)) / Σ|sim_k|</code><br>Subtracting each neighbour\'s mean corrects for individual rating bias.',
            features: ['User-item rating vectors', 'Cosine similarity weights', 'Per-user mean ratings']
          },
          {
            title: 'Top-N recommendation',
            desc: 'Score all unrated movies using the formula above and return the top N.'
          }
        ]
      },
      xgboost: {
        name: 'XGBoost — Gradient Boosting',
        steps: [
          {
            title: 'Build user-item matrix + run SVD',
            desc: 'SVD is run first to produce <code>U_sigma (6040×100)</code> — 100 latent dimensions per user that encode learned taste. These become XGBoost features.'
          },
          {
            title: 'Engineer per-(user, movie) features',
            desc: 'Each training row (a single rating) is enriched with statistics computed from the training set.',
            features: ['user_mean — avg rating this user gives', 'user_count — how many films they rated', 'movie_mean — avg rating this film gets', 'movie_count — how many users rated it', 'svd_0 … svd_99 — 100 user latent dims']
          },
          {
            title: 'Train regression model',
            desc: 'XGBoost fits a 300-tree ensemble on 104 features per row, minimising MSE on the predicted rating. Trees are built with <code>max_depth=6</code>, <code>lr=0.05</code>, row and column subsampling for regularisation.'
          },
          {
            title: 'Fast prediction via dict lookups',
            desc: 'At request time, user/movie stats are fetched from pre-built dicts in O(1). No DataFrame merges — just a single <code>xgb.predict()</code> call per movie.'
          },
          {
            title: 'Top-N recommendation',
            desc: 'Score all unrated movies, sort by predicted rating, return top N.'
          }
        ]
      }
    };

    // ── Render panel content ─────────────────────────────────────────────────
    function renderPanel(model) {
      const p   = PIPELINES[model];
      const el  = document.getElementById('panelContent');
      let html  = `<div class="panel-model-name">${p.name}</div>`;

      p.steps.forEach((s, i) => {
        html += `
          <div class="pipeline-step">
            <div class="step-num">${i + 1}</div>
            <div class="step-body">
              <div class="step-title">${s.title}</div>
              <div class="step-desc">${s.desc}</div>`;

        if (s.features) {
          html += `<div class="features-box">
                     <div class="feat-label">Input features</div>`;
          s.features.forEach(f => { html += `<span class="feat-tag">${f}</span>`; });
          html += `</div>`;
        }

        html += `</div></div>`;
        if (i < p.steps.length - 1) html += `<div class="divider"></div>`;
      });

      el.innerHTML = html;
    }

    // ── Panel toggle ─────────────────────────────────────────────────────────
    let panelOpen = false;

    function togglePanel() {
      panelOpen = !panelOpen;
      const panel  = document.getElementById('sidePanel');
      const toggle = document.getElementById('infoToggle');
      if (panelOpen) {
        renderPanel(document.getElementById('model').value);
        panel.classList.remove('collapsed');
        toggle.classList.add('open');
      } else {
        panel.classList.add('collapsed');
        toggle.classList.remove('open');
      }
    }

    function onModelChange() {
      if (panelOpen) renderPanel(document.getElementById('model').value);
    }

    // ── Recommendation fetch ─────────────────────────────────────────────────
    async function recommend() {
      const userId = document.getElementById('userId').value.trim();
      const model  = document.getElementById('model').value;
      const n      = document.getElementById('topN').value;
      const errEl  = document.getElementById('error');
      const btn    = document.getElementById('btn');
      const out    = document.getElementById('results');

      errEl.style.display = 'none';
      if (!userId) { showError('Please enter a User ID.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="display:inline-block"></div>';
      out.innerHTML = '';

      try {
        const res  = await fetch(`./recommend?user_id=${userId}&model=${model}&n=${n}`);
        const data = await res.json();
        if (!res.ok) { showError(data.detail || 'API error'); return; }

        const badgeClass = `badge-${model}`;
        let html = `<div class="model-badge ${badgeClass}">${model}</div>
                    <div class="movie-grid">`;

        data.recommendations.forEach((m, i) => {
          const pct    = ((m.predicted_rating / 5) * 100).toFixed(1);
          const genres = (m.genres || '').replace(/\|/g, ' · ');
          html += `
            <div class="movie-card">
              <div class="movie-rank">#${i + 1}</div>
              <div class="movie-title">${m.title || 'Unknown'}</div>
              <div class="movie-genres">${genres}</div>
              <div class="star-bar"><div class="star-fill" style="width:${pct}%"></div></div>
              <div class="rating-label">Predicted: <span>${m.predicted_rating}</span> / 5</div>
            </div>`;
        });

        html += '</div>';
        out.innerHTML = html;

      } catch (e) {
        showError('Could not reach the server.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Recommendations';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('userId').addEventListener('keydown', e => {
      if (e.key === 'Enter') recommend();
    });
  </script>
</body>
</html>
